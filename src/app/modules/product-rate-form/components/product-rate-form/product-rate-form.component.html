<form class="form-group form-group--vertical" (ngSubmit)="rate()">
    <label>Rate the product here!</label>
    <input type="number" id="rating" name="rating" [formControl]="rating">
    <button class="button button--primary"
            [class.button--invisible]="rating.invalid || rating.pristine"
            [disabled]="rating.invalid || rating.pristine"
    >✔</button>
</form>
